<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>블록 레벨 요소</title>
    <link rel="stylesheet" href="css/box_model.css" />
  </head>
  <body>
    <div class="main-box">
      <h1>시간이란...</h1>
      <div>내일 죽을 것처럼 <span>오늘</span>을 살고</div>
      <p>영원히 살 것처럼 내일을 꿈꾸어라.</p>

      <h2>박스 모델</h2>

      <p></p>
        박스 모델은 실제 콘텐츠 영역 사이의 여백인 패딩(padding), 박스의
        테두리(border), 그리고 여러 박스 모델 간의여백인 마진(margin) 등의
        요소로 구성됩니다.
      </p>
    </div>
  </body>
</html>
